---
name: Issue
description: Report an issue with the Fumis Python client.
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the issue is.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The version of the Fumis Python client.
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: stove-brand
    attributes:
      label: Stove brand
      description: The manufacturer of your stove.
      placeholder: e.g., Austroflamm, Heta, Eco Spar, Rika
    validations:
      required: false
  - type: input
    id: stove-model
    attributes:
      label: Stove model
      description: The model name of your stove.
      placeholder: e.g., Clou Duo, Green 200
    validations:
      required: false
  - type: textarea
    id: additional-information
    attributes:
      label: Additional information
      description: Any logs, tracebacks, or other context.
    validations:
      required: false
